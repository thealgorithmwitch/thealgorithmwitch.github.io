name: Jobs Freshness Audit

on:
  workflow_dispatch:
    inputs:
      write:
        description: Apply changes and run the full refresh/build path?
        required: false
        default: "false"
  schedule:
    - cron: "30 12 */3 * *"

permissions:
  contents: write

concurrency:
  group: jobs-board-state
  cancel-in-progress: false

jobs:
  freshness-audit:
    runs-on: ubuntu-latest

    env:
      JOBS_DIR: jobs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies if needed
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./${JOBS_DIR}/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Validate freshness audit scripts
        run: |
          node --check "$JOBS_DIR/scripts/freshness-audit.js"
          node --check "$JOBS_DIR/scripts/cleanup-stale-jobs.js"
          node --check "$JOBS_DIR/scripts/job-normalizer.js"
          node --check "$JOBS_DIR/scripts/public-records.js"
          node --check "$JOBS_DIR/scripts/public-jobs.js"
          node --check "$JOBS_DIR/scripts/validate-public-data.js"
          node --check "$JOBS_DIR/scripts/audit-source-coverage.js"

      - name: Run full refresh and write freshness audit
        if: ${{ github.event_name == 'schedule' || github.event.inputs.write == 'true' }}
        run: |
          npm --prefix "$JOBS_DIR" run jobs:discover-sources
          npm --prefix "$JOBS_DIR" run jobs:sync-pending-sources
          npm --prefix "$JOBS_DIR" run jobs:cleanup-stale
          npm --prefix "$JOBS_DIR" run jobs:refresh-public
          npm --prefix "$JOBS_DIR" run jobs:build-pages
          npm --prefix "$JOBS_DIR" run jobs:freshness-audit-write

      - name: Run freshness audit dry run
        if: ${{ github.event_name != 'schedule' && github.event.inputs.write != 'true' }}
        run: npm --prefix "$JOBS_DIR" run jobs:freshness-audit

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate after audit
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Audit source coverage
        run: npm --prefix "$JOBS_DIR" run jobs:audit-source-coverage

      - name: Check for freshness audit changes
        id: changes
        shell: bash
        run: |
          CHANGED="$(git status --porcelain -- \
            "$JOBS_DIR/job-records.json" \
            "$JOBS_DIR/jobs.json" \
            "$JOBS_DIR/pending-jobs.json" \
            "$JOBS_DIR/pending-synced-jobs.json" \
            "$JOBS_DIR/source-discovery-candidates.json" \
            "$JOBS_DIR/source-health-latest.json" \
            "$JOBS_DIR/scrape-report.json" \
            "$JOBS_DIR/validation-snapshots/latest.json" \
            "$JOBS_DIR/reports" \
            "$JOBS_DIR/pages" \
            "$JOBS_DIR"/*.html \
            || true)"
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected freshness audit changes:"
            echo "$CHANGED"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No freshness audit changes detected."
          fi

      - name: Upload freshness audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-freshness-audit-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            jobs/job-records.json
            jobs/jobs.json
            jobs/pending-jobs.json
            jobs/pending-synced-jobs.json
            jobs/source-discovery-candidates.json
            jobs/source-health-latest.json
            jobs/scrape-report.json
            jobs/validation-snapshots/latest.json
            jobs/reports
            jobs/pages
            jobs/*.html

      - name: Commit and push freshness audit changes
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            "$JOBS_DIR/job-records.json" \
            "$JOBS_DIR/jobs.json" \
            "$JOBS_DIR/pending-jobs.json" \
            "$JOBS_DIR/pending-synced-jobs.json" \
            "$JOBS_DIR/source-discovery-candidates.json" \
            "$JOBS_DIR/source-health-latest.json" \
            "$JOBS_DIR/scrape-report.json" \
            "$JOBS_DIR/validation-snapshots/latest.json" \
            "$JOBS_DIR/reports" \
            "$JOBS_DIR/pages" \
            "$JOBS_DIR"/*.html; do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skipping missing path: $path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "Run jobs freshness audit"
          git push

      - name: Report no-op
        if: steps.changes.outputs.changed != 'true'
        run: echo "No commit created."
