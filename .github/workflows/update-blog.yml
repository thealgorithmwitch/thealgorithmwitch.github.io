name: Update Blog From Substack

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog pages
        env:
          SUBSTACK_FEED_URL: "https://feedless.org/feed-builder?url=https:%2F%2Fthealgorithmwitch.substack.com%2Ffeed"
        run: |
          set -euo pipefail

          echo "[workflow] Fetching feed from Feedless proxy"

          node generate-blog.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add blog posts.json

          git diff --cached --quiet || git commit -m "Update blog from Substack"

      - name: Push changes
        run: git push
