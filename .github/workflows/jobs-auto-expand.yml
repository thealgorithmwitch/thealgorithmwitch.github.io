name: Jobs Auto Expand

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the lifecycle in dry-run mode?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_publish:
        description: "Allow capped public auto-publish for very-high-confidence jobs?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      max_auto_publish_per_run:
        description: "Maximum number of jobs to auto-publish in one run"
        required: true
        default: "10"
        type: string
      promote_existing_pending:
        description: "Also consider already-safe existing pending jobs for promotion?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "45 13 * * 2,5"

permissions:
  contents: write

concurrency:
  group: jobs-board-state
  cancel-in-progress: false

jobs:
  auto-expand:
    runs-on: ubuntu-latest

    env:
      JOBS_DIR: jobs
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
      GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      GENERIC_JOB_DATA_API_KEY: ${{ secrets.GENERIC_JOB_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies if needed
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./${JOBS_DIR}/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Validate auto-expand scripts
        run: |
          node --check "$JOBS_DIR/scripts/blocked-source-utils.js"
          node --check "$JOBS_DIR/scripts/check-blocked-sources.js"
          node --check "$JOBS_DIR/scripts/discover-sources.js"
          node --check "$JOBS_DIR/scripts/search-ingest.js"
          node --check "$JOBS_DIR/scripts/sync-targeted-pending-sources.js"
          node --check "$JOBS_DIR/scripts/freshness-audit.js"
          node --check "$JOBS_DIR/scripts/validate-source-expansion.js"
          node --check "$JOBS_DIR/scripts/promote-public-ready.js"
          node --check "$JOBS_DIR/scripts/auto-expand.js"

      - name: Run orchestrated auto-expand lifecycle
        shell: bash
        run: |
          ARGS=()
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS+=(--write)
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--write)
          fi
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ inputs.auto_publish }}" = "true" ]; then
            ARGS+=(--auto-publish)
          fi
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ inputs.promote_existing_pending }}" = "true" ]; then
            ARGS+=(--promote-existing-pending)
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS+=(--max-auto-publish-per-run=10)
          else
            ARGS+=(--max-auto-publish-per-run=${{ inputs.max_auto_publish_per_run }})
          fi
          printf 'Running jobs:auto-expand with args: %s\n' "${ARGS[*]}"
          npm --prefix "$JOBS_DIR" run jobs:auto-expand -- "${ARGS[@]}"

      - name: Build generated job pages
        run: npm --prefix "$JOBS_DIR" run jobs:build-pages

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate generated public data
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Detect relevant lifecycle changes
        id: changes
        shell: bash
        run: |
          CHANGED="$(git status --porcelain -- \
            jobs/sources.json \
            jobs/search-sources.json \
            jobs/source-discovery-candidates.json \
            jobs/pending-jobs.json \
            jobs/pending-synced-jobs.json \
            jobs/jobs.json \
            jobs/job-records.json \
            jobs/source-health-latest.json \
            jobs/scrape-report.json \
            jobs/pages \
            jobs/*.html \
            jobs/reports/source-discovery-report.json \
            jobs/reports/search-ingest-report.json \
            jobs/reports/targeted-pending-source-sync.json \
            jobs/reports/source-expansion-validation-latest.json \
            jobs/reports/public-promotion-latest.json \
            jobs/reports/auto-expand-lifecycle-latest.json \
            jobs/validation-snapshots/latest.json \
            || true)"
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected lifecycle changes:"
            echo "$CHANGED"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No lifecycle changes detected."
          fi

      - name: Upload auto-expand artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-auto-expand-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            jobs/sources.json
            jobs/search-sources.json
            jobs/source-discovery-candidates.json
            jobs/pending-jobs.json
            jobs/pending-synced-jobs.json
            jobs/jobs.json
            jobs/job-records.json
            jobs/source-health-latest.json
            jobs/scrape-report.json
            jobs/pages
            jobs/*.html
            jobs/reports/source-discovery-report.json
            jobs/reports/search-ingest-report.json
            jobs/reports/targeted-pending-source-sync.json
            jobs/reports/source-expansion-validation-latest.json
            jobs/reports/public-promotion-latest.json
            jobs/reports/auto-expand-lifecycle-latest.json
            jobs/validation-snapshots/latest.json

      - name: Commit and push auto-expand changes
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if [ "${{ steps.changes.outputs.changed }}" != "true" ]; then
            echo "No staged lifecycle changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            jobs/sources.json \
            jobs/search-sources.json \
            jobs/source-discovery-candidates.json \
            jobs/pending-jobs.json \
            jobs/pending-synced-jobs.json \
            jobs/jobs.json \
            jobs/job-records.json \
            jobs/source-health-latest.json \
            jobs/scrape-report.json \
            jobs/pages \
            jobs/*.html \
            jobs/reports/source-discovery-report.json \
            jobs/reports/search-ingest-report.json \
            jobs/reports/targeted-pending-source-sync.json \
            jobs/reports/source-expansion-validation-latest.json \
            jobs/reports/public-promotion-latest.json \
            jobs/reports/auto-expand-lifecycle-latest.json \
            jobs/validation-snapshots/latest.json; do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skipping missing path: $path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "Run jobs auto-expand lifecycle"
          git push

      - name: Report no-op
        if: ${{ steps.changes.outputs.changed != 'true' }}
        run: echo "No commit created."
