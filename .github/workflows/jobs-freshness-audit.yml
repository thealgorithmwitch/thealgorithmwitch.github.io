Overall: usable, but not safe enough yet.

Main problems:

1. Pre-audit validation can block the audit
Current:
- validate runs before freshness audit

Problem:
- stale source-health / fetch_failed state can fail before the audit can repair or refresh freshness state

Fix:
- remove pre-audit validation
- or make it non-blocking

2. Build pages is missing
After freshness audit writes changes, pages may be stale.

Add:
npm --prefix "$JOBS_DIR" run jobs:build-pages

3. Source coverage audit is missing
Freshness changes should update source reporting.

Add:
npm --prefix "$JOBS_DIR" run jobs:audit-source-coverage

4. Commit paths are incomplete
Currently commits only narrow freshness files.

Add:
- "$JOBS_DIR/source-health-latest.json"
- "$JOBS_DIR/reports"
- "$JOBS_DIR/pages"

5. Hardcoded paths still appear
Use "$JOBS_DIR" consistently instead of resources/jobs.

6. Validation order should be:
- freshness dry run
- freshness write
- build pages
- validate
- check blocked sources
- audit source coverage
- commit

7. Artifact paths should include:
- reports/**
- pages/**
- source-health-latest.json

8. This workflow should not run sync-sources
Freshness audit is not the same as source sync. It should audit existing state, not discover new jobs.

9. Dry run + write is good
Keep both.

10. Concurrency is good
jobs-board-state is correct.

Recommended order:

1. checkout
2. setup node
3. install dependencies
4. node --check scripts
5. freshness audit dry run
6. freshness audit write
7. build pages
8. validate
9. check blocked sources
10. audit source coverage
11. detect changes
12. upload artifacts
13. commit changes

Suggested fixed core steps:

```yaml
      - name: Run freshness audit dry run
        run: npm --prefix "$JOBS_DIR" run jobs:freshness-audit -- --dry-run

      - name: Run freshness audit write
        run: npm --prefix "$JOBS_DIR" run jobs:freshness-audit -- --write

      - name: Build job pages
        run: npm --prefix "$JOBS_DIR" run jobs:build-pages

      - name: Validate after audit
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Guard blocked sources
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources

      - name: Audit source coverage
        run: npm --prefix "$JOBS_DIR" run jobs:audit-source-coverage
