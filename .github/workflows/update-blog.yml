name: Update Blog From Substack

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog pages
        run: |
          set -euo pipefail

          DIRECT_FEED="https://thealgorithmwitch.substack.com/feed"
          PROXY_FEED="https://feeds.feedburner.com/substack/Y6jFx8FF2qq"

          echo "[workflow] Testing proxied RSS"
          curl -L "$PROXY_FEED" -o /tmp/feed.xml

          if grep -q "<item>" /tmp/feed.xml; then
            echo "[workflow] Proxy returned RSS items"
            FEED_URL="$PROXY_FEED" node generate-blog.mjs
          elif curl -L "$DIRECT_FEED" -o /tmp/direct-feed.xml && grep -q "<item>" /tmp/direct-feed.xml; then
            echo "[workflow] Direct Substack feed returned RSS items"
            FEED_URL="$DIRECT_FEED" node generate-blog.mjs
          elif [ -f posts.json ]; then
            echo "[workflow] No valid RSS available. Rendering from root posts.json"
            node generate-blog.mjs --from-posts-json
          else
            echo "[workflow] No valid RSS and no root posts.json fallback"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add blog posts.json

          git diff --cached --quiet || git commit -m "Update blog from Substack"

      - name: Push changes
        run: git push
