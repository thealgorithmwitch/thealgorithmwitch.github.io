name: Jobs Weekly Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      JOBS_DIR: jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./${JOBS_DIR}/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Syntax check admin scripts
        run: |
          node --check "$JOBS_DIR/scripts/apply-admin-actions.js"
          node --check "$JOBS_DIR/scripts/admin-local-queue.js"
          node --check "$JOBS_DIR/scripts/test-admin-local-queue.js"

      - name: Run quality audit
        working-directory: ${{ env.JOBS_DIR }}
        run: node scripts/quality-audit.js

      - name: Archive fingerprint validation
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          node <<'NODE'
          const g = require('./scripts/archive-fingerprint-guard');
          const d = g.runGuardDiagnostics();
          console.log('archive_records:', d.total_archive_records);
          console.log('public_scanned:', d.total_public_records_scanned);
          console.log('blocked:', d.blocked_by_own_archive, '(expected 0)');
          console.log('passed:', d.passed_sanity_check);
          if (d.blocked_by_own_archive > 0) process.exit(1);
          NODE

      - name: Duplicate ID check
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('jobs.json', 'utf8'));
          const p = JSON.parse(fs.readFileSync('pending-synced-jobs.json', 'utf8'));
          const r = JSON.parse(fs.readFileSync('job-records.json', 'utf8'));

          const seen = new Set();
          const dups = new Set();

          [...j, ...p, ...r].forEach((job) => {
            const id = String(job.id);
            if (seen.has(id)) dups.add(id);
            seen.add(id);
          });

          if (dups.size) {
            console.error('FAIL:', dups.size, 'duplicate IDs across files');
            process.exit(1);
          }

          console.log('PASS: 0 duplicate IDs across all files');
          NODE

      - name: Structure check
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('job-records.json', 'utf8'));

          const missingTitle = r.filter((x) => !String(x.display?.title || x.raw_source_data?.title || '').trim());
          const missingOrg = r.filter((x) => !String(x.display?.organization || x.raw_source_data?.organization || '').trim());
          const missingDesc = r.filter((x) => !String(x.display?.description || x.raw_source_data?.description || '').trim());

          console.log('records missing title:', missingTitle.length);
          console.log('records missing org:', missingOrg.length);
          console.log('records missing description:', missingDesc.length);
          NODE

      - name: Pay integrity check
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('jobs.json', 'utf8'));

          const bad = j.filter((x) => {
            const p = String(x.pay_display || '').toLowerCase();
            return /billion|million|\b\d{7,}\b/.test(p) || (p.includes('k') && parseInt(p, 10) > 500);
          });

          if (bad.length) {
            console.warn('WARN:', bad.length, 'suspicious pay records');
            bad.forEach((x) => console.log(`${x.id}: ${x.pay_display}`));
          } else {
            console.log('PASS: no suspicious pay');
          }
          NODE

      - name: Closed jobs in public check
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const archiveStatuses = new Set(['archived', 'closed', 'rejected', 'not_found', 'access_denied']);
          const j = JSON.parse(fs.readFileSync('jobs.json', 'utf8'));
          const closed = j.filter((x) => archiveStatuses.has(String(x.status || '').toLowerCase()));

          if (closed.length) {
            console.error('FAIL:', closed.length, 'closed/archived jobs in public');
            process.exit(1);
          }

          console.log('PASS: 0 archived jobs in public');
          NODE

      - name: Validate public data
        run: npm --prefix "$JOBS_DIR" run jobs:validate-public-data

      - name: Public/pending overlap check
        working-directory: ${{ env.JOBS_DIR }}
        run: node scripts/repair-published-pending-overlap.js --dry-run

      - name: Generate audit report
        working-directory: ${{ env.JOBS_DIR }}
        shell: bash
        run: |
          mkdir -p reports
          echo "{\"generated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"jobs-audit.yml\"}" > reports/weekly-audit-timestamp.json

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: |
            jobs/reports/*.json
            jobs/reports/*.md
