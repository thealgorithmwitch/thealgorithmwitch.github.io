name: Jobs Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: resources/jobs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Sync sources
        run: npm run jobs:sync-sources

      - name: Fetch approved jobs
        run: npm run jobs:fetch-approved
        env:
          JOBS_BACKEND_URL: ${{ secrets.JOBS_BACKEND_URL }}

      - name: Run search ingest
        run: npm run jobs:search-ingest
        env:
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          JOBS_BACKEND_URL: ${{ secrets.JOBS_BACKEND_URL }}

      - name: Commit job data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json pending-synced-jobs.json
          git diff --cached --quiet || git commit -m "Update jobs board data"
          git push
