name: Update Blog From Substack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog
        run: |
          set -euo pipefail
          echo "[workflow] Trying Substack RSS first"
      
          if node generate-blog.mjs; then
            echo "[workflow] Generated from Substack RSS"
          elif [ -f posts.json ]; then
            echo "[workflow] RSS failed. Generated from root posts.json fallback"
            node generate-blog.mjs --from-posts-json
          else
            echo "[workflow] RSS failed and posts.json is missing"
            exit 1
          fi

      - name: Finalize generated blog subpages
        run: |
          set -euo pipefail
          echo "[workflow] Finalizing generated blog subpages"
          node finalize_blog_subpages.mjs

      - name: Check for changes
        id: changes
        run: |
          echo "[workflow] Git status after generation:"
          git status --short

          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json blog/*.html blog/index.html index.html || true
          git commit -m "chore: update blog pages"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No blog updates detected."
