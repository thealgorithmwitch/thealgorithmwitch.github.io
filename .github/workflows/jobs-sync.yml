• Added a real local fallback path for admin triage and kept the existing Apps
  Script path intact. The main changes are in jobs/admin-review.html, jobs/
  scripts/admin-actions-store.js, jobs/scripts/snapshot-admin-actions.js, jobs/
  scripts/apply-admin-actions.js, jobs/scripts/job-utils.js, and jobs/
  DEPLOYMENT-NOTES.md.

  admin-review.html now works in local-only mode for scraped pending jobs when
  no admin token is configured. It still queues to Apps Script when backend +
  token are available, but it also mirrors actions into browser-local storage
  and can export them as admin-actions-local.json. The Node scripts now prefer
  the backend queue when configured, otherwise they read jobs/admin-actions-
  local.json, and they print which source they used: backend queue, local action
  file, or no actions found.

  I tested the fallback with one sample local action that published the pending
  ACORE role. The persisted result is:

  - job-records.json: 5 -> 6
  - pending-synced-jobs.json: 961 -> 960
  - generated job pages: 5 -> 6
  - sample generated page: jobs/pages/executive-assistant-to-the-president-ceo-
    american-council-on-renewable-energy.html

  The local action file was applied and marked persisted:

  - records published: 1
  - records archived/rejected: 0
  - records left pending: 960
  - job pages regenerated: 6
  - local action status in jobs/admin-actions-local.json: applied

  Console behavior now looks like this:

  - jobs:snapshot-admin-actions: using backend queue or using local action file,
    then no actions found or snapshot count
  - jobs:apply-admin-actions: using backend queue or using local action file,
    then either no actions found or the publish/archive/page regeneration totals

  I also re-ran syntax checks on the updated scripts and inline admin JS; both
  passed.

