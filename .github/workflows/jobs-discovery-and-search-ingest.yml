name: Jobs Discovery and Search Ingest

on:
  workflow_dispatch:
    inputs:
      discover_write:
        description: "Append eligible discovered ATS sources to resources/jobs/sources.json?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      search_write:
        description: "Write search-ingested jobs to pending-synced-jobs.json?"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      candidates_file:
        description: "Path to the discovery candidate file (.json or .txt)."
        required: true
        default: "resources/jobs/source-discovery-candidates.json"
        type: string
      search_sources_file:
        description: "Path to the search source config JSON."
        required: true
        default: "resources/jobs/search-sources.json"
        type: string
  schedule:
    - cron: "15 13 * * 3"

permissions:
  contents: write

concurrency:
  group: jobs-board-state
  cancel-in-progress: false

jobs:
  discovery-and-search-ingest:
    runs-on: ubuntu-latest

    env:
      JOBS_DIR: resources/jobs
      CANDIDATES_FILE: ${{ github.event.inputs.candidates_file || 'resources/jobs/source-discovery-candidates.json' }}
      SEARCH_SOURCES_FILE: ${{ github.event.inputs.search_sources_file || 'resources/jobs/search-sources.json' }}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
      GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      GENERIC_JOB_DATA_API_KEY: ${{ secrets.GENERIC_JOB_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: resources/jobs/package.json

      - name: Install dependencies if needed
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./resources/jobs/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Validate discovery and search scripts
        run: |
          node --check "$JOBS_DIR/scripts/discover-sources.js"
          node --check "$JOBS_DIR/scripts/search-ingest.js"
          node --check "$JOBS_DIR/scripts/source-discovery-helpers.js"
          node --check "$JOBS_DIR/scripts/sync-targeted-pending-sources.js"
          node --check "$JOBS_DIR/scripts/ats-clients.js"

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate public data before automation
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Run source discovery
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.discover_write }}" != "true" ]; then
            npm --prefix "$JOBS_DIR" run jobs:discover-sources -- --candidates-file "$CANDIDATES_FILE" --queries-file "$SEARCH_SOURCES_FILE"
          else
            npm --prefix "$JOBS_DIR" run jobs:discover-sources-write -- --candidates-file "$CANDIDATES_FILE" --queries-file "$SEARCH_SOURCES_FILE"
          fi

      - name: Run search ingest
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.search_write }}" = "true" ]; then
            npm --prefix "$JOBS_DIR" run jobs:search-ingest-write -- --queries-file "$SEARCH_SOURCES_FILE"
          else
            npm --prefix "$JOBS_DIR" run jobs:search-ingest -- --queries-file "$SEARCH_SOURCES_FILE"
          fi

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate public data after automation
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Detect meaningful changes
        id: changes
        shell: bash
        run: |
          SOURCES_CHANGED="$(git status --porcelain -- resources/jobs/sources.json || true)"
          CANDIDATES_CHANGED="$(git status --porcelain -- resources/jobs/source-discovery-candidates.json || true)"
          PENDING_CHANGED="$(git status --porcelain -- resources/jobs/pending-synced-jobs.json || true)"
          SOURCE_HEALTH_CHANGED="$(git status --porcelain -- resources/jobs/source-health-latest.json || true)"
          REPORTS_CHANGED="$(git status --porcelain -- \
            resources/jobs/reports/source-discovery-report.json \
            resources/jobs/reports/search-ingest-report.json \
            resources/jobs/validation-snapshots/latest.json \
            || true)"
          ERROR_SIGNAL="$(node - <<'NODE'
          const fs = require('fs');
          function readJson(file) {
            try {
              return JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch (_) {
              return null;
            }
          }
          const searchReport = readJson('resources/jobs/reports/search-ingest-report.json');
          const discoveryReport = readJson('resources/jobs/reports/source-discovery-report.json');
          const searchError = Number(searchReport?.summary?.meaningful_error_count || 0) > 0;
          const discoveryError = Array.isArray(discoveryReport?.query_reports)
            && discoveryReport.query_reports.some((entry) => ['missing_env_vars', 'fetch_failed'].includes(String(entry?.status || '')));
          process.stdout.write(searchError || discoveryError ? 'true' : 'false');
          NODE
          )"
          CORE_CHANGED="false"
          REPORT_COMMIT="false"
          if [ -n "$SOURCES_CHANGED" ] || [ -n "$CANDIDATES_CHANGED" ] || [ -n "$PENDING_CHANGED" ]; then
            CORE_CHANGED="true"
            REPORT_COMMIT="true"
          elif [ "$ERROR_SIGNAL" = "true" ]; then
            REPORT_COMMIT="true"
          fi
          {
            echo "sources_changed=$([ -n "$SOURCES_CHANGED" ] && echo true || echo false)"
            echo "candidates_changed=$([ -n "$CANDIDATES_CHANGED" ] && echo true || echo false)"
            echo "pending_changed=$([ -n "$PENDING_CHANGED" ] && echo true || echo false)"
            echo "source_health_changed=$([ -n "$SOURCE_HEALTH_CHANGED" ] && echo true || echo false)"
            echo "reports_changed=$([ -n "$REPORTS_CHANGED" ] && echo true || echo false)"
            echo "core_changed=$CORE_CHANGED"
            echo "error_signal=$ERROR_SIGNAL"
            echo "should_commit_reports=$REPORT_COMMIT"
          } >> "$GITHUB_OUTPUT"
          echo "sources_changed=$SOURCES_CHANGED"
          echo "candidates_changed=$CANDIDATES_CHANGED"
          echo "pending_changed=$PENDING_CHANGED"
          echo "source_health_changed=$SOURCE_HEALTH_CHANGED"
          echo "reports_changed=$REPORTS_CHANGED"
          echo "error_signal=$ERROR_SIGNAL"

      - name: Upload discovery and ingest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-discovery-search-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            resources/jobs/sources.json
            resources/jobs/source-discovery-candidates.json
            resources/jobs/pending-synced-jobs.json
            resources/jobs/source-health-latest.json
            resources/jobs/reports/source-discovery-report.json
            resources/jobs/reports/search-ingest-report.json
            resources/jobs/validation-snapshots/latest.json

      - name: Commit and push discovery/search changes
        if: steps.changes.outputs.core_changed == 'true' || steps.changes.outputs.should_commit_reports == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.changes.outputs.sources_changed }}" = "true" ] && [ -e resources/jobs/sources.json ]; then
            git add resources/jobs/sources.json
          fi
          if [ "${{ steps.changes.outputs.candidates_changed }}" = "true" ] && [ -e resources/jobs/source-discovery-candidates.json ]; then
            git add resources/jobs/source-discovery-candidates.json
          fi
          if [ "${{ steps.changes.outputs.pending_changed }}" = "true" ] && [ -e resources/jobs/pending-synced-jobs.json ]; then
            git add resources/jobs/pending-synced-jobs.json
          fi
          if [ "${{ steps.changes.outputs.should_commit_reports }}" = "true" ]; then
            for path in \
              resources/jobs/source-health-latest.json \
              resources/jobs/reports/source-discovery-report.json \
              resources/jobs/reports/search-ingest-report.json \
              resources/jobs/validation-snapshots/latest.json; do
              if [ -e "$path" ]; then
                git add "$path"
              else
                echo "Skipping missing path: $path"
              fi
            done
          fi
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "Run jobs discovery and search ingest"
          git push

      - name: Report no-op
        if: steps.changes.outputs.core_changed != 'true' && steps.changes.outputs.should_commit_reports != 'true'
        run: echo "No commit created."
