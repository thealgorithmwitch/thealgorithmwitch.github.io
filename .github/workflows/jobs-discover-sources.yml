name: Jobs Discover Sources

on:
  workflow_dispatch:
    inputs:
      write:
        description: "Append eligible discovered sources to jobs/sources.json?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      candidates_file:
        description: "Path to the discovery candidate file (.json or .txt)."
        required: true
        default: "jobs/source-discovery-candidates.json"
        type: string
      search_sources_file:
        description: "Path to the search source config JSON."
        required: true
        default: "jobs/search-sources.json"
        type: string

permissions:
  contents: write

concurrency:
  group: jobs-board-state
  cancel-in-progress: false

jobs:
  discover-sources:
    runs-on: ubuntu-latest

    env:
      JOBS_DIR: jobs
      CANDIDATES_FILE: ${{ github.event.inputs.candidates_file || 'jobs/source-discovery-candidates.json' }}
      SEARCH_SOURCES_FILE: ${{ github.event.inputs.search_sources_file || 'jobs/search-sources.json' }}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
      GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      GENERIC_JOB_DATA_API_KEY: ${{ secrets.GENERIC_JOB_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies if needed
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./${JOBS_DIR}/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Validate discovery scripts
        run: |
          node --check "$JOBS_DIR/scripts/discover-sources.js"
          node --check "$JOBS_DIR/scripts/search-ingest.js"
          node --check "$JOBS_DIR/scripts/source-discovery-helpers.js"

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate public data before discovery
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Run discovery
        shell: bash
        run: |
          if [ "${{ inputs.write }}" = "true" ]; then
            npm --prefix "$JOBS_DIR" run jobs:discover-sources-write -- --candidates-file "$CANDIDATES_FILE" --queries-file "$SEARCH_SOURCES_FILE"
          else
            npm --prefix "$JOBS_DIR" run jobs:discover-sources -- --candidates-file "$CANDIDATES_FILE" --queries-file "$SEARCH_SOURCES_FILE"
          fi

      - name: Guard and fix blocked sources before validation
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources -- --write

      - name: Validate public data after discovery
        run: npm --prefix "$JOBS_DIR" run jobs:validate

      - name: Check for source onboarding changes
        if: ${{ inputs.write == 'true' }}
        id: changes
        shell: bash
        run: |
          CORE_CHANGED="$(git status --porcelain -- \
            jobs/sources.json \
            jobs/source-discovery-candidates.json \
            || true)"
          if [ -n "$CORE_CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected discovery changes:"
            echo "$CORE_CHANGED"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No discovery changes detected."
          fi

      - name: Upload discovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-discover-sources-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            jobs/sources.json
            jobs/source-discovery-candidates.json
            jobs/scrape-report.json
            jobs/reports/source-discovery-report.json
            jobs/validation-snapshots/latest.json

      - name: Commit and push discovery changes
        if: ${{ inputs.write == 'true' && steps.changes.outputs.changed == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            jobs/sources.json \
            jobs/source-discovery-candidates.json \
            jobs/scrape-report.json \
            jobs/reports/source-discovery-report.json \
            jobs/validation-snapshots/latest.json; do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skipping missing path: $path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "Discover mission-aligned job sources"
          git push

      - name: Report no-op
        if: ${{ inputs.write == 'true' && steps.changes.outputs.changed != 'true' }}
        run: echo "No commit created."
