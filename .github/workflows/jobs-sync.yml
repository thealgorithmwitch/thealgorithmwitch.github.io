name: Jobs Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      JOBS_BACKEND_URL: ${{ secrets.JOBS_BACKEND_URL }}
      GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
      GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Sync configured sources
        run: npm run jobs:sync-sources

      - name: Fetch approved jobs
        run: npm run jobs:fetch-approved

      - name: Ingest wide-search leads
        if: ${{ (secrets.GOOGLE_CUSTOM_SEARCH_API_KEY != '' && secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID != '') || secrets.SERPAPI_API_KEY != '' }}
        run: npm run jobs:search-ingest

      - name: Commit updated job data
        run: |
          if git diff --quiet -- jobs.json pending-synced-jobs.json; then
            echo "No job data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json pending-synced-jobs.json
          git commit -m "Update jobs board data"
          git push
