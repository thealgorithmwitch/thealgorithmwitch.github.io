        let state = loadState();
        let quizSelections = {};

        function loadState() {
            try {
                const parsed = JSON.parse(localStorage.getItem(storageKey) || '{}');
                return {
                    currentLesson: Math.min(parsed.currentLesson || 0, lessons.length - 1),
                    completedLessons: Array.isArray(parsed.completedLessons) ? parsed.completedLessons.filter(Number.isInteger) : []
                };
            } catch {
                return { currentLesson: 0, completedLessons: [] };
            }
        }

        function saveState() {
            localStorage.setItem(storageKey, JSON.stringify(state));
        }

        function isCompleted(index) {
            return state.completedLessons.includes(index);
        }

        function maxUnlockedLesson() {
            const sorted = [...state.completedLessons].sort((a, b) => a - b);
            let unlocked = 0;
            while (sorted.includes(unlocked)) unlocked += 1;
            return Math.min(unlocked, lessons.length - 1);
        }

        function canOpen(index) {
            return index <= maxUnlockedLesson() || isCompleted(index);
        }

        function setCurrentLesson(index) {
            if (!canOpen(index)) return;
            state.currentLesson = index;
            quizSelections = {};
            saveState();
            render();
            document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function completeCurrentLesson() {
            const idx = state.currentLesson;
            if (!isCompleted(idx)) state.completedLessons.push(idx);
            state.completedLessons = [...new Set(state.completedLessons)].sort((a, b) => a - b);
            if (idx < lessons.length - 1) state.currentLesson = Math.min(idx + 1, maxUnlockedLesson());
            quizSelections = {};
            saveState();
            render();
            document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetProgress() {
            state = { currentLesson: 0, completedLessons: [] };
            quizSelections = {};
            saveState();
            render();
            document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = lessons.map((lesson, index) => {
                const active = index === state.currentLesson;
                const complete = isCompleted(index);
                const unlocked = canOpen(index);
                const itemClass = active
                    ? 'sidebar-active flex items-center gap-4 px-4 py-3 rounded-lg text-sm font-bold transition-all'
                    : unlocked
                        ? 'flex items-center gap-4 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white text-sm font-semibold transition-all'
                        : 'flex items-center gap-4 px-4 py-3 rounded-lg text-white/30 text-sm font-semibold transition-all cursor-not-allowed';
                const badgeClass = complete
                    ? 'w-6 h-6 rounded-full bg-[#00BFA5] text-white flex items-center justify-center text-[10px] shrink-0'
                    : active
                        ? 'w-6 h-6 rounded-full bg-[#F28C28] text-white flex items-center justify-center text-[10px] shrink-0'
                        : unlocked
                            ? 'w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px] shrink-0'
                            : 'w-6 h-6 rounded-full bg-white/5 flex items-center justify-center text-[10px] shrink-0';
                const badge = complete ? '<i class="ph-bold ph-check"></i>' : String(index + 1);
                return `<button data-lesson-index="${index}" class="${itemClass}" ${unlocked ? '' : 'disabled'}><span class="${badgeClass}">${badge}</span><span class="text-left">${lesson.title}</span></button>`;
            }).join('');
        }

        function renderProgress() {
            const completeCount = state.completedLessons.length;
            const percent = Math.round((completeCount / lessons.length) * 100);
            document.getElementById('progressLabel').textContent = `${percent}% Complete`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        function renderSurvey(survey) {
            return `

                    <div class="flex flex-col mb-8">

                    <form class="space-y-8">

                            ${survey.fields.map((field) => {
                                if (field.type === 'text' || field.type === 'email') {
                                    return `<div><label class="block text-sm font-bold text-[#1D2D7D] mb-2">${field.label}</label><input type="${field.type}" placeholder="${field.placeholder || ''}" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-[#F28C28] focus:ring-4 focus:ring-orange-100 outline-none transition-all font-medium"></div>`;

                                }
                                if (field.type === 'textarea') {
                                    return `<div class="col-span-2"><label class="block text-sm font-bold text-[#1D2D7D] mb-2">${field.label}</label><textarea rows="3" placeholder="${field.placeholder || ''}" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-[#F28C28] focus:ring-4 focus:ring-orange-100 outline-none transition-all font-medium resize-none"></textarea></div>`;
                                }
                                if (field.type === 'radio') {
                                    return `<div class="col-span-2"><label class="block text-sm font-bold text-[#1D2D7D] mb-2">${field.label}</label><div class="flex gap-8">${field.options.map((option, idx) => `<label class="flex items-center gap-3 cursor-pointer group"><input type="radio" name="${field.label.replace(/\W+/g, '_')}" ${idx === 0 ? '' : ''} class="w-5 h-5 accent-[#F28C28]"><span class="text-slate-600 font-semibold group-hover:text-[#F28C28] transition-colors">${option}</span></label>`).join('')}</div></div>`;
                                }
                                return '';
                            }).join('')}
                        </div>
                    </form>
                </section>
            `;
        }

        function renderQuiz(quiz) {
            return `
                <section class="quiz-card bg-white rounded-3xl p-10 shadow-xl border border-slate-100 space-y-8">
                    <div>
                        <span class="text-[#00BFA5] font-black uppercase tracking-[0.3em] text-xs mb-2 block">Knowledge Check</span>
                        <h3 class="text-3xl font-black text-[#1D2D7D]">${quiz.title}</h3>
                    </div>
                    <div class="space-y-8">
                        ${quiz.questions.map((question, questionIndex) => `
                            <div class="space-y-3">
                                <p class="font-bold text-[#1D2D7D]">${questionIndex + 1}. ${question.prompt}</p>
                                <div class="space-y-2 text-sm font-semibold text-slate-600">
                                    ${question.options.map((option, optionIndex) => `
                                        <button type="button" data-quiz-question="${questionIndex}" data-quiz-option="${optionIndex}" class="answer-option unanswered w-full text-left rounded-xl border border-slate-200 px-5 py-3 flex justify-between items-center gap-4 transition-all">
                                            <span>${option}</span>
                                            <span class="text-xs font-black uppercase tracking-widest text-transparent"></span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderLesson() {
            const lesson = lessons[state.currentLesson];
            document.getElementById('lessonEyebrow').textContent = lesson.eyebrow;
            document.getElementById('lessonTitle').textContent = lesson.title;
            const content = [];
            if (lesson.videos) content.push(renderVideos(lesson.videos));
            if (lesson.sections) content.push(...lesson.sections.map(renderSection));
            if (lesson.survey) content.push(renderSurvey(lesson.survey));
            if (lesson.quiz) content.push(renderQuiz(lesson.quiz));
            document.getElementById('lessonContent').innerHTML = `<div class="space-y-10">${content.join('<div class="h-px bg-slate-200"></div>')}</div>`;
        }

        function renderFooter() {
            const prevButton = document.getElementById('prevButton');
            const completeButton = document.getElementById('completeButton');
            const completeButtonText = document.getElementById('completeButtonText');
            const upNextLabel = document.getElementById('upNextLabel');
            const footerStatus = document.getElementById('footerStatus');
            const footerHint = document.getElementById('footerHint');
            const currentComplete = isCompleted(state.currentLesson);
            const nextLesson = lessons[state.currentLesson + 1];

            prevButton.disabled = state.currentLesson === 0;
            prevButton.className = state.currentLesson === 0
                ? 'w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-300 cursor-not-allowed'
                : 'w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50';

            upNextLabel.textContent = nextLesson ? nextLesson.title : 'All lessons complete';

            if (currentComplete) {
                footerStatus.textContent = 'Completed';
                footerStatus.className = 'text-[#00BFA5] text-xs font-black uppercase tracking-widest block';
                footerHint.textContent = nextLesson ? 'You can move to the next lesson' : 'Training finished';
                completeButtonText.textContent = nextLesson ? 'Review Complete' : 'All Modules Complete';
            } else {
                footerStatus.textContent = 'In Progress';
                footerStatus.className = 'text-[#F28C28] text-xs font-black uppercase tracking-widest block';
                footerHint.textContent = 'Complete this lesson to unlock the next one';
                completeButtonText.textContent = 'Module Complete';
            }
        }

        function bindEvents() {
            document.getElementById('sidebarNav').addEventListener('click', (event) => {
                const button = event.target.closest('[data-lesson-index]');
                if (!button) return;
                setCurrentLesson(Number(button.dataset.lessonIndex));
            });
            document.getElementById('prevButton').addEventListener('click', () => {
                if (state.currentLesson > 0) setCurrentLesson(state.currentLesson - 1);
            });
            document.getElementById('lessonContent').addEventListener('click', (event) => {
                const option = event.target.closest('[data-quiz-question][data-quiz-option]');
                if (!option) return;
                const questionIndex = Number(option.dataset.quizQuestion);
                const optionIndex = Number(option.dataset.quizOption);
                if (Number.isNaN(questionIndex) || Number.isNaN(optionIndex)) return;
                quizSelections[questionIndex] = optionIndex;
                updateQuizFeedback();
            });
            document.getElementById('completeButton').addEventListener('click', completeCurrentLesson);
            document.getElementById('resetProgress').addEventListener('click', resetProgress);
        }

        function updateQuizFeedback() {
            const lesson = lessons[state.currentLesson];
            if (!lesson.quiz) return;
            document.querySelectorAll('[data-quiz-question]').forEach((button) => {
                const questionIndex = Number(button.dataset.quizQuestion);
                const optionIndex = Number(button.dataset.quizOption);
                const selected = quizSelections[questionIndex];
                const correct = lesson.quiz.questions[questionIndex].correct;
                const label = button.querySelector('span:last-child');
                button.className = 'answer-option w-full text-left rounded-xl border border-slate-200 px-5 py-3 flex justify-between items-center gap-4 transition-all';
                if (selected === undefined) {
                    button.classList.add('unanswered');
                    label.textContent = '';
                    label.className = 'text-xs font-black uppercase tracking-widest text-transparent';
                    label.style.color = '';
                    return;
                }
                if (optionIndex === correct) {
                    button.classList.add('correct');
                    label.textContent = 'Correct';
                    label.className = 'text-[#00BFA5] text-xs font-black uppercase tracking-widest';
                    label.style.color = '#00BFA5';
                } else if (optionIndex === selected) {
                    button.classList.add('incorrect');
                    label.textContent = 'Incorrect';
                    label.className = 'text-xs font-black uppercase tracking-widest';
                    label.style.color = '#B91C1C';
                } else {
                    label.textContent = '';
                    label.className = 'text-xs font-black uppercase tracking-widest text-transparent';
                    label.style.color = '';
                }
            });
        }

        function render() {
            renderSidebar();
            renderProgress();
            renderLesson();
            renderFooter();
            updateQuizFeedback();
        }

        bindEvents();
        render();
    </script>
</body></html>
