
<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">

    <title vid="4">Climate Action Training Posters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Playfair+Display:ital,wght@0,900;1,900&amp;family=Space+Grotesque:wght@300;700&amp;display=swap" rel="stylesheet" vid="7">
    <style vid="8">
        :root {
            --bg: #F2F2F2;
            --text: #121212;
            --accent-orange: #FF6B00;
            --accent-yellow: #FFD600;
            --accent-blue: #00A3FF;
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Space Grotesque', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: #E5E5E5;
            color: var(--text);
            font-family: var(--font-sans);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        .poster-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        
        .poster {
          width: 1080px;
          height: 1350px;
          background-color: var(--bg);
          position: relative;
          overflow: hidden;
          box-shadow: none;
          display: flex;
          flex-direction: column;
          padding: 80px; /* scale padding up slightly */
        }

        
        .sparkle {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--text);
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
        }

        .badge-live {
            position: absolute;
            top: 60px;
            right: 60px;
            border: 1px solid var(--text);
            padding: 4px 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-live::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #FF0000;
            border-radius: 50%;
            display: inline-block;
        }

        .vertical-label {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            font-family: var(--font-sans);
            font-weight: 300;
            letter-spacing: 0.8em;
            font-size: 40px;
            opacity: 0.1;
            text-transform: uppercase;
            pointer-events: none;
        }

        
        #v1 .aura-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,107,0,0.4) 0%, rgba(255,214,0,0.2) 40%, rgba(242,242,242,0) 70%);
            top: 15%;
            left: -10%;
            z-index: 0;
        }

        #v1 .title-wrap {
            position: relative;
            z-index: 2;
        }

        #v1 h1 {
            font-family: var(--font-display);
            font-size: 82px;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        #v1 h1 span {
            display: block;
            -webkit-text-stroke: 1px var(--text);
            color: transparent;
        }

        #v1 .subtitle {
            font-family: var(--font-mono);
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-orange);
            font-weight: bold;
        }

        #v1 .hero-cutout {
            position: absolute;
            bottom: 150px;
            right: -50px;
            width: 500px;
            height: 650px;
            background-image: url('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            clip-path: polygon(10% 0%, 100% 0%, 100% 100%, 0% 100%);
            border: 1px solid var(--text);
            z-index: 1;
        }

        #v1 .orbital-ring {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 1px dashed rgba(0,0,0,0.2);
            border-radius: 50%;
            top: 250px;
            left: -100px;
            transform: rotate(-15deg);
        }

        #v1 .datetime {
            position: absolute;
            bottom: 250px;
            left: 60px;
            font-family: var(--font-display);
            font-size: 56px;
            font-style: italic;
        }

        
        #v2 .grid-aura {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 80% 20%, rgba(0,163,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(255,214,0,0.15) 0%, transparent 40%);
        }

        #v2 .collage {
            position: absolute;
            top: 280px;
            left: 60px;
            right: 60px;
            height: 480px;
            display: flex;
            gap: 20px;
        }

        .slice {
            flex: 1;
            height: 100%;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--text);
            transition: transform 0.3s ease;
        }

        .slice-1 { 
            background-image: url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=1913&auto=format&fit=crop'); 
            height: 80%;
            margin-top: 10%;
            clip-path: polygon(0 0, 100% 15%, 100% 100%, 0 85%);
        }
        .slice-2 { 
            background-image: url('https://images.unsplash.com/photo-1497435334941-8c899ee9e8e9?q=80&w=1975&auto=format&fit=crop');
            height: 100%;
            clip-path: polygon(0 15%, 100% 0, 100% 85%, 0 100%);
        }
        .slice-3 { 
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop'); 
            height: 70%;
            margin-top: 20%;
            clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
        }

        #v2 h1 {
          font-size: 96px;
        }
        
        #v2 .date-strip {
          font-size: 32px;
        }
        
        .bccec-logo {
          height: 72px;
        }
        
        .partner-logo-img {
          height: 80px;
        }

        #v2 .subtitle-alt {
            text-align: center;
            display: block;
            font-family: var(--font-mono);
            background: var(--text);
            color: white;
            padding: 4px 10px;
            width: max-content;
            margin: 10px auto;
            font-size: 14px;
        }

        #v2 .date-strip {
            position: absolute;
            bottom: 180px;
            width: calc(100% - 120px);
            border-top: 1px solid var(--text);
            border-bottom: 1px solid var(--text);
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 24px;
        }

        .logo-text {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 14px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .partner-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            opacity: 0.6;
        }

        .partner-icon {
            width: 32px;
            height: 32px;
            background: var(--text);
            border-radius: 4px;
        }

        
        .v1-sparkle-1 { top: 120px; left: 40px; }
        .v1-sparkle-2 { top: 400px; right: 100px; transform: scale(0.6); }
        
        .v2-sparkle-1 { top: 80px; left: 60px; }
        .v2-sparkle-2 { bottom: 250px; right: 60px; transform: rotate(45deg); }

        .footer {
          margin-top: auto;
          display: flex;
          justify-content: center;
          align-items: center;
          padding-top: 40px;
          border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .logo-row {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 28px;
          width: 100%;
        }
        
        .logo-group {
          display: flex;
          align-items: center;
          gap: 8px;
        }
        
        .logo-icon {
          width: 48px;
          height: 48px;
          color: white;
          background: transparent;
          padding: 0;
          flex-shrink: 0;
        }
        
        .bccec-logo {
          height: 58px;
          width: auto;
          object-fit: contain;
        }
        
        .partner-logo-img {
          height: 64px;
          width: auto;
          object-fit: contain;
          background: white;
          padding: 8px 12px;
          border-radius: 10px;
        }
