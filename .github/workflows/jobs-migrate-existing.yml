name: Jobs Manual Parser Migration

on:
  workflow_dispatch:
    inputs:
      write:
        description: "Apply migration changes? Use true to write, false for dry run."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: jobs-board-state
  cancel-in-progress: false

jobs:
  migrate-existing-jobs:
    runs-on: ubuntu-latest

    env:
      JOBS_DIR: resources/jobs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: resources/jobs/package-lock.json

      - name: Install dependencies if needed
        shell: bash
        run: |
          if [ -f "$JOBS_DIR/package-lock.json" ] || [ -f "$JOBS_DIR/npm-shrinkwrap.json" ]; then
            npm --prefix "$JOBS_DIR" ci
          elif node -e "const p=require('./resources/jobs/package.json'); const hasDeps=Object.keys(p.dependencies||{}).length > 0 || Object.keys(p.devDependencies||{}).length > 0; process.exit(hasDeps ? 0 : 1)"; then
            npm --prefix "$JOBS_DIR" install
          else
            echo "No package dependencies declared. Skipping npm install."
          fi

      - name: Validate migration script
        run: |
          node --check "$JOBS_DIR/scripts/migrate-existing-job-fields.js"
          node --check "$JOBS_DIR/scripts/validate-public-data.js"

      - name: Validate public data before migration
        run: npm --prefix "$JOBS_DIR" run jobs:validate-public-data

      - name: Run migration dry run
        if: ${{ inputs.write == 'false' }}
        run: npm --prefix "$JOBS_DIR" run jobs:migrate-existing

      - name: Run migration write
        if: ${{ inputs.write == 'true' }}
        run: npm --prefix "$JOBS_DIR" run jobs:migrate-existing -- --write

      - name: Check for migration output changes
        if: ${{ inputs.write == 'true' }}
        id: changes
        shell: bash
        run: |
          CHANGED="$(git status --porcelain -- \
            resources/jobs/job-records.json \
            resources/jobs/jobs.json \
            resources/jobs/pending-jobs.json \
            resources/jobs/pending-synced-jobs.json \
            resources/jobs/pages \
            resources/jobs/*.html \
            || true)"
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected migration output changes:"
            echo "$CHANGED"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No migration output changes detected."
          fi

      - name: Check pending file size
        if: ${{ inputs.write == 'true' }}
        shell: bash
        run: |
          SIZE_BYTES=$(wc -c < "$JOBS_DIR/pending-synced-jobs.json")
          MAX_BYTES=$((25 * 1024 * 1024))
          echo "pending-synced-jobs.json size: $SIZE_BYTES bytes"
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "pending-synced-jobs.json exceeds 25MB. Refusing to commit."
            exit 1
          fi

      - name: Route repairable public validation issues
        if: ${{ inputs.write == 'true' }}
        run: npm --prefix "$JOBS_DIR" run jobs:validate-public-data:route

      - name: Validate public data after migration write
        if: ${{ inputs.write == 'true' }}
        run: npm --prefix "$JOBS_DIR" run jobs:validate-public-data

      - name: Guard blocked sources
        if: ${{ inputs.write == 'true' }}
        run: npm --prefix "$JOBS_DIR" run jobs:check-blocked-sources

      - name: Upload migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-manual-parser-migration-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            resources/jobs/job-records.json
            resources/jobs/jobs.json
            resources/jobs/pending-jobs.json
            resources/jobs/pending-synced-jobs.json
            resources/jobs/pages
            resources/jobs/*.html
            resources/jobs/validation-snapshots/latest.json

      - name: Commit and push migration changes
        if: ${{ inputs.write == 'true' && steps.changes.outputs.changed == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            resources/jobs/job-records.json \
            resources/jobs/jobs.json \
            resources/jobs/pending-jobs.json \
            resources/jobs/pending-synced-jobs.json \
            resources/jobs/pages \
            resources/jobs/*.html \
            resources/jobs/validation-snapshots/latest.json; do
            if [ -e "$path" ]; then
              git add "$path"
            else
              echo "Skipping missing path: $path"
            fi
          done
          git commit -m "Apply manual parser migration to jobs"
          git push

      - name: Report no-op
        if: ${{ inputs.write == 'true' && steps.changes.outputs.changed != 'true' }}
        run: echo "No commit created."
